{% extends 'base.html' %}

{% block content %}
<form method="post">
    <input class="form-control mb-2" name="nombre" value="{{ producto.nombre }}">
    <input class="form-control mb-2" name="categoria" value="{{ producto.categoria }}">
    <input class="form-control mb-2" name="precio" value="{{ producto.precio }}">
    <input class="form-control mb-2" name="stock" value="{{ producto.stock }}">
    <button class="btn btn-warning">Actualizar</button>
</form>
{% endblock %}
